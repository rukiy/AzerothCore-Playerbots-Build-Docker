# ============================================
# 下载与镜像加速配置
# ============================================

# Ubuntu apt 镜像域名；用于生成构建用 Dockerfile 时替换 apt 源。
# 只填写域名，不要带 http:// 或 /ubuntu 后缀。
UBUNTU_MIRROR="mirrors.aliyun.com"

# GitHub Release 文件下载代理列表。
# 只用于 releases/download 这类实际文件下载，例如 client-data 的 data.zip。
GITHUB_RELEASE_ASSET_MIRRORS=(
    # 通用 GitHub 文件代理。
    "https://gh-proxy.com/"
    # GitHub 文件代理备用源。
    "https://gh.llkk.cc/"
    # GitHub 文件代理备用源。
    "https://gh.idayer.com/"
    # GitHub 文件代理备用源。
    "https://ghproxy.net/"
)

# GitHub Release latest 解析代理列表。
# 用于访问 releases/latest 并解析跳转后的最新版本号；原始 GitHub 可用时脚本会优先使用原始地址。
GITHUB_RELEASE_LATEST_MIRRORS=(
    # 支持 latest 跳转解析的备用源。
    "https://gh.idayer.com/"
    # 通用 GitHub 代理备用源。
    "https://gh-proxy.com/"
    # 通用 GitHub 代理备用源。
    "https://gh.llkk.cc/"
)

# GitHub 源码压缩包代理列表。
# 只用于 archive/HEAD.zip、archive/refs/heads/*.zip 等源码压缩包下载。
GITHUB_SOURCE_ARCHIVE_MIRRORS=(
    # 通用 GitHub 源码压缩包代理。
    "https://gh-proxy.com/"
    # GitHub 源码压缩包代理备用源。
    "https://gh.llkk.cc/"
    # GitHub 源码压缩包代理备用源。
    "https://gh.idayer.com/"
)

# Docker 镜像拉取加速源列表。
# 拉取成功后脚本会把加速源镜像 tag 为标准镜像名，并删除加速源临时标签。
DOCKER_IMAGE_PULL_MIRRORS=(
    # DaoCloud Docker Hub 加速源。
    "docker.m.daocloud.io"
    # Docker Hub 加速源备用地址。
    "docker.1ms.run"
    # Docker Hub 加速源备用地址。
    "docker.xuanyuan.me"
    # Docker Hub 加速源备用地址。
    "dockerproxy.net"
    # Docker Hub 加速源备用地址。
    "docker.chenby.cn"
)
