# ============================================
# AzerothCore + Playerbots 安装脚本配置
# ============================================

# realmlist 显示名称；留空时脚本默认使用 Azeroth。
REALMLIST_NAME=

# 客户端连接服务器使用的公网地址、域名或 IP；留空时自动使用本机内网 IP。
REALMLIST_ADDRESS=

# 客户端在同一局域网访问时使用的地址；留空时自动使用本机内网 IP。
REALMLIST_LOCAL_ADDRESS=

# 客户端数据版本；latest 表示自动解析 wowgaming/client-data 最新 release。
CLIENT_DATA_VERSION="latest"

# 客户端数据包自定义下载地址；留空时按 CLIENT_DATA_VERSION 自动拼接 GitHub Release 地址。
CLIENT_DATA_DOWNLOAD_URL=

# 下载缓存目录；保存源码包、客户端数据包、Docker 镜像 tar，uninstall 不删除。
AC_DOWNLOAD_DIR="downloads"

# 镜像源偏好记录文件；脚本会记录上次成功的 GitHub/Docker 加速源，下次优先使用。
AC_MIRROR_STATE_FILE="downloads/mirror-preferences.env"

# 是否启用 Docker 镜像 tar 缓存；1=启用，0=不保存和加载 downloads/docker-images/*.tar。
AC_DOCKER_IMAGE_ARCHIVE_CACHE=1

# AzerothCore 主源码仓库，格式为 owner/repo，不要写 .git 地址。
ACORE_SOURCE_REPO="liyunfan1223/azerothcore-wotlk"

# AzerothCore 主源码分支；脚本会下载该分支的 GitHub zip 压缩包。
ACORE_SOURCE_BRANCH="Playerbot"

# AzerothCore 模块源码仓库列表，格式为 owner/repo；默认下载各仓库 HEAD.zip。
ACORE_MODULE_REPOS=(
    # Playerbots 主模块。
    liyunfan1223/mod-playerbots
    # Playerbots 等级段模块。
    DustinHendrickson/mod-player-bot-level-brackets
    # 范围拾取模块。
    azerothcore/mod-aoe-loot
    # 个人进度模块。
    ZhengPeiRu21/mod-individual-progression
    # 自动学习技能模块。
    noisiver/mod-learnspells
    # 升级烟花模块。
    azerothcore/mod-fireworks-on-level
    # ALE Lua 扩展模块。
    azerothcore/mod-ale
    # 自动平衡模块。
    azerothcore/mod-autobalance
    # 幻化模块。
    azerothcore/mod-transmog
    # 拍卖行机器人增强模块。
    NathanHandley/mod-ah-bot-plus
    # 升级祝贺模块。
    azerothcore/mod-congrats-on-level
    # 跨阵营战场模块。
    azerothcore/mod-cfbg
)

# Docker 基础镜像列表；安装前会预拉或从 tar 缓存加载。
DOCKER_BASE_IMAGES=(
    # AzerothCore 构建基础系统镜像。
    "ubuntu:24.04"
    # 数据库服务镜像。
    "mysql:8.4"
    # Docker BuildKit 构建器镜像。
    "moby/buildkit:buildx-stable-1"
)

# BuildKit 构建器名称；install/update 会按该名称创建可限制内存的 builder。
DOCKER_BUILDX_BUILDER_NAME="acore-builder"

# BuildKit 构建器镜像；通常保持和 DOCKER_BASE_IMAGES 中的 moby/buildkit 一致。
DOCKER_BUILDKIT_IMAGE="moby/buildkit:buildx-stable-1"

# Docker Compose 构建并发兼容项；当前脚本不使用 docker compose build --parallel，通常留空。
DOCKER_BUILDKIT_MAX_PARALLELISM=

# 每个编译 job 估算内存，单位 MB；留空时不按单 job 内存限制并行数。
DOCKER_BUILD_MEMORY_PER_JOB_MB=

# curl 低速判定阈值，单位字节/秒；低于该速度并持续 DOWNLOAD_LOW_SPEED_TIME 会切换下载源。
DOWNLOAD_LOW_SPEED_LIMIT=32768

# curl 低速持续时间，单位秒；配合 DOWNLOAD_LOW_SPEED_LIMIT 使用。
DOWNLOAD_LOW_SPEED_TIME=60

# curl 建立连接超时时间，单位秒。
DOWNLOAD_CONNECT_TIMEOUT=10

# 单个下载请求最长运行时间，单位秒。
DOWNLOAD_MAX_TIME=300

# 镜像源探测连接超时时间，单位秒。
DOWNLOAD_PROBE_CONNECT_TIMEOUT=5

# 镜像源探测请求最长运行时间，单位秒。
DOWNLOAD_PROBE_MAX_TIME=15

# Docker 镜像源探测使用的小镜像；检测成功后会立即删除。
DOCKER_MIRROR_PROBE_IMAGE="hello-world:latest"

# Docker 镜像源探测超时时间，单位秒；避免某个 Docker 加速源卡住 install/update。
DOCKER_MIRROR_PROBE_TIMEOUT=5

# 脚本主日志目录；每次执行命令会重建日志。
AC_LOG_DIR="build/logs"

# 脚本主日志文件；uninstall 删除 build/ 后该日志也会被删除。
AC_LOG_FILE="build/logs/ac.log"

# 下载阶段日志文件；下载进度不会刷多行重复进度。
AC_DOWNLOAD_LOG_FILE="build/logs/downloads.log"

# 镜像检测日志文件；记录每个 GitHub/Docker 加速地址的检测过程和结果。
AC_MIRROR_LOG_FILE="build/logs/mirrors.log"

# 是否启用自动内存规划；1=自动，0=使用下面手动配置或默认值。
AC_MEMORY_AUTO=1

# 手动固定保留内存，单位 MB；留空时自动使用“当前系统已用内存 + AC_MEMORY_DYNAMIC_RESERVED_EXTRA_MB”。
AC_MEMORY_RESERVED_MB=

# 自动保留内存额外值，单位 MB；默认在当前系统已用内存基础上再保留 512MB。
AC_MEMORY_DYNAMIC_RESERVED_EXTRA_MB=512

# BuildKit 构建器内存上限；留空时自动按系统内存规划，示例：4096m、4g。
DOCKER_BUILD_MEMORY_LIMIT=

# CMake 编译并行 job 数；留空时自动使用 CPU 核数，低于 4GB 内存时自动为 1。
DOCKER_BUILD_PARALLEL_JOBS=

# MySQL 数据库容器内存上限；留空时自动规划。
AC_DATABASE_MEMORY_LIMIT=

# worldserver 容器内存上限；留空时自动规划。
AC_WORLDSERVER_MEMORY_LIMIT=

# authserver 容器内存上限；留空时自动规划。
AC_AUTHSERVER_MEMORY_LIMIT=

# 客户端数据初始化容器内存上限；留空时自动规划。
AC_CLIENT_DATA_INIT_MEMORY_LIMIT=

# MySQL innodb_buffer_pool_size；留空时按数据库容器内存自动生成。
AC_DATABASE_INNODB_BUFFER_POOL_SIZE=
