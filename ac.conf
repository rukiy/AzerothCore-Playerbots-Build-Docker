# 构建服务器地址 域名或ip
REALMLIST_NAME=
REALMLIST_ADDRESS=
REALMLIST_LOCAL_ADDRESS=

# 客户端数据版本
CLIENT_DATA_VERSION="v19"
CLIENT_DATA_DOWNLOAD_URL="https://github.com/wowgaming/client-data/releases/download/${CLIENT_DATA_VERSION}/data.zip"

# AzerothCore 仓库
GIT_ACORE_URL="https://github.com/liyunfan1223/azerothcore-wotlk.git"
GIT_ACORE_BRANCH="Playerbot"

# AzerothCore 模块仓库
GIT_ACORE_MODULE_URLS=(
    https://github.com/liyunfan1223/mod-playerbots.git
    https://github.com/DustinHendrickson/mod-player-bot-level-brackets.git
    https://github.com/azerothcore/mod-aoe-loot.git
    https://github.com/ZhengPeiRu21/mod-individual-progression.git
    https://github.com/noisiver/mod-learnspells.git
    https://github.com/azerothcore/mod-fireworks-on-level.git
    https://github.com/azerothcore/mod-ale.git
    https://github.com/azerothcore/mod-autobalance.git
    https://github.com/azerothcore/mod-transmog.git
    https://github.com/NathanHandley/mod-ah-bot-plus.git
    https://github.com/azerothcore/mod-congrats-on-level.git
    https://github.com/azerothcore/mod-cfbg.git
)

# Docker 基础镜像，预拉成功后统一保留标准镜像名
DOCKER_BASE_IMAGES=(
    "ubuntu:24.04"
    "mysql:8.4"
    "moby/buildkit:buildx-stable-1"
)

# 构建器配置
DOCKER_BUILDX_BUILDER_NAME="acore-lowmem"
DOCKER_BUILDKIT_IMAGE="moby/buildkit:buildx-stable-1"
DOCKER_BUILDKIT_MAX_PARALLELISM=

# Git 网络超时，单位秒
GIT_LS_REMOTE_TIMEOUT=20
GIT_CLONE_TIMEOUT=180
GIT_PULL_TIMEOUT=120
DOWNLOAD_LOW_SPEED_LIMIT=32768
DOWNLOAD_LOW_SPEED_TIME=60

# 脚本运行日志；每次执行会删除上次日志，不保留历史
AC_LOG_DIR="build/logs"
AC_LOG_FILE="build/logs/ac.log"

# 内存配置：留空自动；单位建议使用 m/g，例如 4096m、4g
AC_MEMORY_AUTO=1
AC_MEMORY_RESERVED_MB=1024
DOCKER_BUILD_MEMORY_LIMIT=
DOCKER_BUILD_PARALLEL_JOBS=
AC_DATABASE_MEMORY_LIMIT=
AC_WORLDSERVER_MEMORY_LIMIT=
AC_AUTHSERVER_MEMORY_LIMIT=
AC_DATABASE_INNODB_BUFFER_POOL_SIZE=
